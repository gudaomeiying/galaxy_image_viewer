workflows:
  android_build:
    name: Android Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: 3.44.0
      xcode: 16
      java: 17
      vars:
        APP_NAME: Galaxy Image Viewer
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Run Flutter analyze
        script: flutter analyze
      - name: Build Android APK
        script: |
          cd android
          echo "android.minSdkVersion=21" >> gradle.properties
          cd ..
          flutter build apk --release
    artifacts:
      - build/app/outputs/flutter-apk/app-release.apk

  ios_build:
    name: iOS Build
    instance_type: mac_mini_m2
    max_build_duration: 30
    environment:
      flutter: 3.44.0
      xcode: 16
      cocoapods: 1.15.2
      vars:
        APP_NAME: Galaxy Image Viewer
    scripts:
      - name: Get Flutter dependencies
        script: flutter pub get
      - name: Install CocoaPods dependencies
        script: |
          cd ios
          pod install
          cd ..
      - name: Run Flutter analyze
        script: flutter analyze
      - name: Build iOS IPA
        script: flutter build ipa --release --no-codesign
    artifacts:
      - build/ios/ipa/*.ipa
